name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: write  # write needed to create GitHub Releases
  packages: write  # needed to push to GHCR

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Resolve the version: use the tag name on tag pushes, "dev" otherwise.
      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/itw-welding-ab/kubekee
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=build-${{ github.run_number }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          file: Dockerfile
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LDFLAGS=-X github.com/ITW-Welding-AB/KubeKee/internal/cli.version=${{ steps.ver.outputs.VERSION }} -s -w

      # Build release binaries only on tag pushes
      - name: Build release binaries
        if: startsWith(github.ref, 'refs/tags/')
        env:
          LDFLAGS: -X github.com/ITW-Welding-AB/KubeKee/internal/cli.version=${{ steps.ver.outputs.VERSION }} -s -w
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64  go build -ldflags "$LDFLAGS" -o dist/kubekee-linux-amd64      ./cmd/kubekee
          GOOS=linux   GOARCH=arm64  go build -ldflags "$LDFLAGS" -o dist/kubekee-linux-arm64      ./cmd/kubekee
          GOOS=darwin  GOARCH=amd64  go build -ldflags "$LDFLAGS" -o dist/kubekee-darwin-amd64     ./cmd/kubekee
          GOOS=darwin  GOARCH=arm64  go build -ldflags "$LDFLAGS" -o dist/kubekee-darwin-arm64     ./cmd/kubekee
          GOOS=windows GOARCH=amd64  go build -ldflags "$LDFLAGS" -o dist/kubekee-windows-amd64.exe ./cmd/kubekee

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
